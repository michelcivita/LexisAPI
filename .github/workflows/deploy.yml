- name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v2
      with:
        # Nome exato do recurso (sem sufixos de região)
        app-name: 'lckwebapp-dhaphndxbpargfen'
        
        # O segredo com o conteúdo do arquivo .publishsettings
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        
        # Imagem pública para o teste
        images: 'nginx:latest'
        
        # REMOVIDOS: slot-name e package
